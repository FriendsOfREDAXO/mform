package: mform
version: '9.2.1'
name: MForm
author: Friends Of REDAXO
supportpage: https://github.com/FriendsOfREDAXO/mform
page:
    title: 'translate:title'
    pjax: true
    perm: admin[]
    icon: rex-icon fa-diagram-next
    subpages:
        docs:
            title: 'translate:docs'
            icon: rex-icon fa-book
        demo:
            title: 'translate:reference_demo'
            subpages:
                demo_base: { title: 'translate:demo_base' }
                demo_wrapper: { title: 'translate:demo_wrapper' }
                demo_extended: { title: 'translate:demo_extended' }
                demo_repeater: { title: 'translate:demo_repeater' }
                demo_rexform: { title: 'translate:demo_rexform' }
                demo_expert: { title: 'translate:demo_expert' }
                demo_layout_preview: { title: 'translate:demo_layout_preview' }

        formbuilder:
            title: 'translate:formbuilder'
            icon: rex-icon fa-grip

        migration:
            title: 'translate:migration'
            icon: rex-icon fa-rotate

        changelog:
            title: 'translate:changelog'
            subPath: CHANGELOG.md
            itemClass: pull-right

requires:
    php: '>=8.0'
    redaxo: '^5.17.0'

conflicts:
    packages:
        ui_tools: '<1.0.0'
